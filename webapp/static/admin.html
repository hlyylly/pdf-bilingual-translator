<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DualPDF · 运营后台</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .adm { max-width: 1080px; margin: 22px auto; padding: 0 16px; }
    .adm h2 { font-size: 18px; margin: 26px 0 12px; }
    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .stat { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 18px; }
    .stat .v { font-size: 28px; font-weight: 800; color: var(--ink); letter-spacing: -.5px; }
    .stat .v small { font-size: 14px; color: var(--ok); font-weight: 700; margin-left: 6px; }
    .stat .l { color: var(--sub); font-size: 13px; margin-top: 4px; }
    .stat.rev .v { color: var(--brand-d); }
    table { width: 100%; border-collapse: collapse; background: #fff;
      border: 1px solid var(--line); border-radius: 12px; overflow: hidden; font-size: 14px; }
    th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--line); }
    th { background: #f7f8fc; color: var(--sub); font-weight: 600; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    .tag { font-size: 12px; padding: 2px 8px; border-radius: 12px; }
    .tag.paid { background: #e2f6ec; color: var(--ok); }
    .tag.pending { background: #fff3e0; color: var(--warn); }
    .tag.failed { background: #f1f3f9; color: var(--sub); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .gate { max-width: 380px; margin: 12vh auto; text-align: center; }
    .cdk-gen { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
    .cdk-gen label { display: flex; flex-direction: column; gap: 5px; font-size: 13px; color: var(--sub); }
    .cdk-gen input { padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; font-size: 14px; width: 150px; }
    .cdk-gen input:focus { border-color: var(--brand); outline: none; }
    .btn-copy { padding: 10px 20px; background: var(--brand); color: #fff; border: none; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-copy:hover { background: var(--brand-d); }
    .cdk-result { margin-top: 16px; }
    .cdk-result-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 13px; color: var(--ok); }
    .cdk-result-head .link { margin-left: 12px; }
    #cdkCodes { width: 100%; font-family: monospace; font-size: 13px; border: 1px solid var(--line); border-radius: 10px; padding: 10px; resize: vertical; }
    .cdk-card .link { color: var(--brand); }
    .cdk-search { display: flex; gap: 8px; align-items: center; margin: 22px 0 10px; flex-wrap: wrap; }
    .cdk-search input { flex: 1; min-width: 220px; padding: 9px 12px; border: 1px solid var(--line); border-radius: 9px; font-size: 14px; }
    .cdk-search input:focus { border-color: var(--brand); outline: none; }
    .cdk-search select { padding: 9px 10px; border: 1px solid var(--line); border-radius: 9px; font-size: 14px; }
    .cdk-listmsg { color: var(--sub); font-size: 13px; }
    td.code { font-family: monospace; font-size: 13px; }
    .st-used { color: var(--warn); } .st-unused { color: var(--ok); }
    @media (max-width: 800px) { .cards { grid-template-columns: repeat(2,1fr); } .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/">📑 DualPDF <span class="brand-zh">对照译</span> · 运营后台</a>
    <div class="userbar"><a class="link" href="/app">← 工作台</a> <button id="refresh" class="link">刷新</button></div>
  </header>

  <div id="gate" class="card gate hidden"></div>

  <main id="dash" class="adm hidden">
    <h2>核心指标</h2>
    <div class="cards" id="cards"></div>

    <h2>卡密管理（兑换码）</h2>
    <div class="card cdk-card">
      <div class="cdk-gen">
        <label>单卡页数 <input id="cdkPages" type="number" value="300" min="1" /></label>
        <label>生成数量 <input id="cdkCount" type="number" value="10" min="1" max="2000" /></label>
        <label>批次备注 <input id="cdkBatch" type="text" placeholder="如 taobao0626" /></label>
        <button id="cdkGen" class="btn-copy">生成卡密</button>
      </div>
      <div id="cdkResult" class="cdk-result hidden">
        <div class="cdk-result-head">
          <span id="cdkResultMsg"></span>
          <span>
            <button id="cdkCopy" class="link">复制全部</button>
            <button id="cdkDownload" class="link">下载 .txt</button>
          </span>
        </div>
        <textarea id="cdkCodes" readonly rows="6"></textarea>
      </div>
      <table style="margin-top:16px">
        <thead><tr><th>批次</th><th>单卡页数</th><th>总数</th><th>已用</th><th>剩余</th><th>操作</th></tr></thead>
        <tbody id="cdkBatches"></tbody>
      </table>

      <div class="cdk-search">
        <input id="cdkQ" placeholder="查询指定卡密 / 批次（输入码片段）" autocomplete="off" />
        <select id="cdkStatus">
          <option value="">全部状态</option>
          <option value="unused">未使用</option>
          <option value="used">已使用</option>
        </select>
        <button id="cdkQuery" class="btn-copy">查询</button>
        <span id="cdkListMsg" class="cdk-listmsg"></span>
      </div>
      <table>
        <thead><tr><th>卡密</th><th>页数</th><th>批次</th><th>状态</th><th>使用者</th><th>使用时间</th></tr></thead>
        <tbody id="cdkList"></tbody>
      </table>
    </div>

    <div class="two-col">
      <div>
        <h2>最近订单</h2>
        <table><thead><tr><th>用户</th><th>套餐</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
          <tbody id="orders"></tbody></table>
      </div>
      <div>
        <h2>最近注册</h2>
        <table><thead><tr><th>用户</th><th>余额</th><th>邀请人</th><th>时间</th></tr></thead>
          <tbody id="users"></tbody></table>
      </div>
    </div>
  </main>

  <script src="/static/admin.js"></script>
</body>
</html>
