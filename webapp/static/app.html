<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DualPDF 对照译 · 工作台</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <a class="brand" href="/">📑 DualPDF <span class="brand-zh">对照译</span></a>
    <div id="userbar" class="userbar hidden">
      <span id="quota" class="quota"></span>
      <button id="ordersBtn" class="link">充值记录</button>
      <span id="username" class="who"></span>
      <button id="logout" class="link">退出</button>
    </div>
  </header>

  <!-- 登录 / 注册 -->
  <section id="authView" class="card auth hidden">
    <div class="tabs">
      <button class="tab active" data-tab="login">登录</button>
      <button class="tab" data-tab="register">注册</button>
    </div>
    <form id="authForm">
      <input id="f-username" placeholder="用户名（3-20 位字母/数字/下划线）" autocomplete="username" />
      <input id="f-password" type="password" placeholder="密码（至少 6 位）" autocomplete="current-password" />
      <button type="submit" id="authSubmit" class="primary">登录</button>
      <div id="authMsg" class="msg"></div>
    </form>
  </section>

  <!-- 主面板 -->
  <main id="appView" class="hidden">
    <section class="card upload">
      <div class="lang-row">
        <label for="langSelect">翻译成</label>
        <select id="langSelect"></select>
        <span class="lang-hint">原文语言自动识别</span>
      </div>
      <div id="drop" class="dropzone">
        <input id="fileInput" type="file" accept="application/pdf" multiple hidden />
        <div class="dz-inner">
          <div class="dz-icon">⬆️</div>
          <div>点击或拖拽 PDF 到此处上传</div>
          <div class="hint">原文页 + 译文页 交替对照输出，公式/图表保留 · 单文件 ≤ <span id="maxmb"></span> MB</div>
        </div>
      </div>
      <div id="uploadMsg" class="msg"></div>
    </section>

    <section class="card">
      <h3>任务列表</h3>
      <div id="jobs" class="jobs"><div class="empty">还没有任务，上传一个 PDF 试试。</div></div>
    </section>
  </main>

  <!-- 充值记录弹窗 -->
  <div id="ordersModal" class="modal hidden">
    <div class="modal-box">
      <button id="ordersClose" class="modal-close">×</button>
      <h3>充值记录</h3>
      <div id="ordersList" class="orders-list"></div>
    </div>
  </div>

  <!-- 充值弹窗 -->
  <div id="payModal" class="modal hidden">
    <div class="modal-box">
      <button id="payClose" class="modal-close">×</button>
      <h3>购买页数包</h3>
      <div id="packList" class="pack-list"></div>
      <div id="payQr" class="pay-qr hidden">
        <img id="qrImg" alt="微信支付二维码" />
        <div class="pay-tip">请用<strong>微信扫码</strong>支付 <span id="payAmt"></span></div>
        <div id="payState" class="pay-state">等待支付…</div>
        <button id="payBack" class="link">← 选其他套餐</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
